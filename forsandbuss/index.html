<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Bussavganger Forsand</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 0;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            border-left: 2px solid #000;
            border-right: 2px solid #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
        }
        
        header {
            background: #000;
            color: white;
            padding: 25px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            border-bottom: 3px solid #000;
        }
        
        h1 {
            font-size: 1.6em;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .last-updated {
            font-size: 0.85em;
            opacity: 0.85;
            margin-top: 10px;
        }
        
        .direction-toggle {
            display: flex;
            justify-content: center;
            gap: 0;
            margin: 12px auto 0;
            max-width: 320px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 4px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .direction-btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.7);
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .direction-btn.active {
            background: white;
            color: #000;
            font-weight: 600;
        }
        
        .direction-btn:active {
            transform: scale(0.98);
        }
        
        .last-updated {
            font-size: 0.85em;
            opacity: 0.85;
            margin-top: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #666;
        }
        
        .error {
            background: #fee;
            color: #c00;
            padding: 20px;
            margin: 20px;
            border-radius: 8px;
            border: 1px solid #fcc;
        }
        
        .departures {
            padding: 10px 0;
        }
        
        .departure {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 12px;
            align-items: center;
            padding: 18px 15px;
            border-bottom: 1px solid #e0e0e0;
            transition: background 0.15s;
            min-height: 80px;
        }
        
        .departure:active {
            background: #f8f9fa;
        }
        
        .departure:last-child {
            border-bottom: none;
        }
        
        .line-number {
            background: #000;
            color: white;
            font-weight: 700;
            padding: 10px 14px;
            border-radius: 8px;
            min-width: 55px;
            text-align: center;
            font-size: 1.2em;
            line-height: 1;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        .destination {
            min-width: 0;
        }
        
        .destination-name {
            font-weight: 600;
            font-size: 1.05em;
            color: #222;
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .quay {
            font-size: 0.8em;
            color: #777;
            margin-top: 4px;
        }
        
        .time-info {
            text-align: right;
            white-space: nowrap;
        }
        
        .departure-time {
            font-size: 1.4em;
            font-weight: 700;
            color: #000;
            line-height: 1.2;
        }
        
        .realtime {
            color: #28a745;
        }
        
        .delayed {
            color: #dc3545;
        }
        
        .countdown {
            font-size: 0.8em;
            color: #666;
            margin-top: 4px;
            font-weight: 500;
        }
        
        .arrival-time {
            font-size: 0.75em;
            color: #000;
            margin-top: 2px;
            font-weight: 400;
        }
        
        .no-departures {
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 1em;
        }
        
        @media (min-width: 601px) {
            body {
                padding: 20px;
            }
            
            .container {
                border-radius: 12px;
                min-height: auto;
                border: 2px solid #000;
            }
            
            header {
                border-radius: 10px 10px 0 0;
                padding: 30px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .departures {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="headerTitle">Bussavganger Forsand</h1>
            <div class="direction-toggle">
                <button class="direction-btn active" id="btnFra">Fra Forsand</button>
                <button class="direction-btn" id="btnTil">Til Forsand</button>
            </div>
            <div class="last-updated">Laster data...</div>
        </header>
        
        <div id="content" class="loading">
            Henter sanntidsdata...
        </div>
    </div>

    <script>
        // Quay IDs
        const QUAY_JORPELAND = 'NSR:Quay:48261'; // Jørpeland
        const QUAY_FORSAND = 'NSR:Quay:48722';   // Forsand
        
        const ENTUR_API = 'https://api.entur.io/journey-planner/v3/graphql';
        
        let currentDirection = 'fra'; // 'fra' eller 'til'
        let currentQuayId = QUAY_FORSAND;
        
        async function fetchDepartures() {
            const query = `
            {
              quay(id: "${currentQuayId}") {
                name
                estimatedCalls(numberOfDepartures: 50, timeRange: 86400) {
                  expectedDepartureTime
                  aimedDepartureTime
                  realtime
                  destinationDisplay {
                    frontText
                  }
                  serviceJourney {
                    id
                    line {
                      publicCode
                      transportMode
                    }
                    estimatedCalls {
                      quay {
                        name
                        id
                      }
                      aimedDepartureTime
                      expectedDepartureTime
                      aimedArrivalTime
                      expectedArrivalTime
                    }
                  }
                }
              }
            }`;
            
            try {
                const response = await fetch(ENTUR_API, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ET-Client-Name': 'fhaavik-forsand-buss'
                    },
                    body: JSON.stringify({ query })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.errors) {
                    throw new Error(data.errors[0].message);
                }
                
                return data.data;
            } catch (error) {
                console.error('Feil ved henting av data:', error);
                throw error;
            }
        }
        
        function getArrivalTimes(estimatedCalls) {
            if (!estimatedCalls || estimatedCalls.length === 0) return {};
            
            const arrivals = {};
            
            // Finn avgangspunkt
            const startIndex = estimatedCalls.findIndex(call => 
                call.quay && (call.quay.id === currentQuayId)
            );
            
            if (startIndex === -1) return arrivals;
            
            // Søk fremover for å finne ankomst til relevante stopp
            for (let i = startIndex + 1; i < estimatedCalls.length; i++) {
                const call = estimatedCalls[i];
                if (!call.quay || !call.quay.name) continue;
                
                const name = call.quay.name.toLowerCase();
                const time = call.expectedArrivalTime || call.aimedArrivalTime;
                
                // Jørpeland
                if (!arrivals.jorpeland && (name.includes('jørpeland') || call.quay.id === QUAY_JORPELAND)) {
                    arrivals.jorpeland = time;
                }
                
                // Forsand
                if (!arrivals.forsand && (name.includes('forsand') || call.quay.id === QUAY_FORSAND)) {
                    arrivals.forsand = time;
                }
            }
            
            return arrivals;
        }
        
        function formatTime(isoString) {
            const date = new Date(isoString);
            return date.toLocaleTimeString('no-NO', { hour: '2-digit', minute: '2-digit' });
        }
        
        function getCountdown(isoString) {
            const now = new Date();
            const departureTime = new Date(isoString);
            const diffMs = departureTime - now;
            const diffMins = Math.floor(diffMs / 60000);
            
            if (diffMins < 0) return 'Kjørt';
            if (diffMins === 0) return 'Nå';
            if (diffMins === 1) return 'Om 1 minutt';
            if (diffMins < 60) return `Om ${diffMins} minutter`;
            
            const hours = Math.floor(diffMins / 60);
            const mins = diffMins % 60;
            return `Om ${hours}t ${mins}m`;
        }
        
        function renderDepartures(data) {
            const content = document.getElementById('content');
            const lastUpdated = document.querySelector('.last-updated');
            
            if (!data.quay || !data.quay.estimatedCalls || data.quay.estimatedCalls.length === 0) {
                content.innerHTML = '<div class="no-departures">Ingen avganger funnet de neste 24 timene</div>';
                return;
            }
            
            const now = new Date();
            const endTime = new Date(now.getTime() + 24 * 60 * 60 * 1000);
            
            // Filtrer avganger innenfor de neste 24 timene
            let departures = data.quay.estimatedCalls.filter(call => {
                const depTime = new Date(call.expectedDepartureTime);
                return depTime >= now && depTime <= endTime;
            });
            
            // Hvis retning er "til", filtrer bort busser som ikke går til Forsand
            if (currentDirection === 'til') {
                departures = departures.filter(call => {
                    if (!call.serviceJourney || !call.serviceJourney.estimatedCalls) return false;
                    // Sjekk om Forsand er i rutelisten
                    return call.serviceJourney.estimatedCalls.some(estimatedCall => 
                        estimatedCall.quay && 
                        (estimatedCall.quay.id === QUAY_FORSAND || 
                         (estimatedCall.quay.name && estimatedCall.quay.name.toLowerCase().includes('forsand')))
                    );
                });
            }
            
            if (departures.length === 0) {
                content.innerHTML = `<div class="no-departures">Ingen avganger de neste 24 timene</div>`;
                return;
            }
            
            let html = '<div class="departures">';
            
            departures.forEach(call => {
                const isDelayed = call.expectedDepartureTime !== call.aimedDepartureTime;
                const timeClass = call.realtime ? 'realtime' : (isDelayed ? 'delayed' : '');
                const lineNumber = call.serviceJourney.line.publicCode;
                const destination = call.destinationDisplay.frontText;
                const departureTime = formatTime(call.expectedDepartureTime);
                const countdown = getCountdown(call.expectedDepartureTime);
                
                // Hent ankomsttider
                const arrivals = getArrivalTimes(call.serviceJourney.estimatedCalls);
                let arrivalTimeHtml = '';
                
                if (currentDirection === 'fra') {
                    // Fra Forsand: vis ankomst til Jørpeland
                    if (arrivals.jorpeland) {
                        arrivalTimeHtml = `<div class="arrival-time">Ank. Jørpeland ${formatTime(arrivals.jorpeland)}</div>`;
                    }
                } else {
                    // Til Forsand: vis ankomst til Forsand
                    if (arrivals.forsand) {
                        arrivalTimeHtml = `<div class="arrival-time">Ank. Forsand ${formatTime(arrivals.forsand)}</div>`;
                    }
                }
                
                html += `
                    <div class="departure">
                        <div class="line-number">${lineNumber}</div>
                        <div class="destination">
                            <div class="destination-name">${destination}</div>
                            <div class="quay">${data.quay.name}</div>
                        </div>
                        <div class="time-info">
                            <div class="departure-time ${timeClass}">${departureTime}</div>
                            ${arrivalTimeHtml}
                            <div class="countdown">${countdown}</div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            content.innerHTML = html;
            
            const now_formatted = now.toLocaleTimeString('no-NO');
            lastUpdated.textContent = `Sist oppdatert: ${now_formatted}`;
        }
        
        function showError(message) {
            const content = document.getElementById('content');
            content.innerHTML = `<div class="error">⚠️ Feil: ${message}</div>`;
        }
        
        async function updateDepartures() {
            try {
                const data = await fetchDepartures();
                renderDepartures(data);
            } catch (error) {
                showError(error.message || 'Kunne ikke hente avganger');
            }
        }
        
        function setDirection(direction) {
            currentDirection = direction;
            
            // Oppdater knapper
            document.getElementById('btnFra').classList.toggle('active', direction === 'fra');
            document.getElementById('btnTil').classList.toggle('active', direction === 'til');
            
            // Oppdater quay ID
            if (direction === 'fra') {
                currentQuayId = QUAY_FORSAND;
            } else {
                currentQuayId = QUAY_JORPELAND;
            }
            
            updateDepartures();
        }
        
        // Oppdater ved lasting
        updateDepartures();
        
        // Oppdater hvert minutt
        setInterval(updateDepartures, 60000);
        
        // Håndter retning-endring
        document.getElementById('btnFra').addEventListener('click', () => setDirection('fra'));
        document.getElementById('btnTil').addEventListener('click', () => setDirection('til'));
    </script>
</body>
</html>
